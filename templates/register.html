<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Price Predictor - Register</title>


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">



<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;

}



body{

height:100vh;

background:

linear-gradient(
rgba(3,15,40,.85),
rgba(3,15,40,.9)
),

url("https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=1600");


background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

}




.login-container{

width:100%;

display:flex;

justify-content:center;

align-items:center;

}




.login-card{

width:420px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border-radius:25px;

padding:35px;

box-shadow:
0 20px 40px rgba(0,0,0,.5);

color:white;


animation:slide .8s ease;

}



@keyframes slide{

from{

opacity:0;

transform:translateY(-50px);

}

to{

opacity:1;

transform:translateY(0);

}

}




.logo-section{

text-align:center;

margin-bottom:25px;

}



.car-icon{

font-size:55px;

color:#00c6ff;

}



.logo-section h1{

font-size:30px;

margin-top:10px;

}



.logo-section p{

color:#ddd;

}




.form-card h2{

text-align:center;

font-size:28px;

}



.form-card>p{

text-align:center;

color:#ddd;

margin:10px 0 25px;

}




.input-group{

display:flex;

align-items:center;

background:white;

border-radius:12px;

margin-bottom:18px;

padding:0 15px;

}



.input-group i{

color:#0066ff;

font-size:18px;

}



.input-group input{


width:100%;

border:none;

outline:none;

padding:15px;

font-size:15px;


}




.login-btn{


width:100%;

padding:15px;

border:none;

border-radius:30px;

background:

linear-gradient(
90deg,
#0066ff,
#00c6ff
);


color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;


}



.login-btn:hover{


transform:scale(1.05);


box-shadow:

0 10px 25px rgba(0,198,255,.5);


}





.signup-link{

text-align:center;

margin-top:25px;

color:#ddd;

}



.signup-link a{

color:#00c6ff;

font-weight:bold;

text-decoration:none;

}




.alert{


background:#ff4d4d;

padding:12px;

border-radius:10px;

text-align:center;

margin-bottom:15px;


}



</style>


</head>



<body>



<div class="login-container">



<div class="login-card">



<div class="logo-section">


<i class="fas fa-car-side car-icon"></i>


<h1>
Vehicle Price
</h1>


<p>
Create Your Account
</p>


</div>





<div class="form-card">



<h2>
Create Account
</h2>


<p>
Register to access prediction dashboard
</p>





{% with messages = get_flashed_messages() %}

{% if messages %}

<div class="alert">

{% for message in messages %}

{{message}}

{% endfor %}

</div>

{% endif %}

{% endwith %}





<form method="POST">





<div class="input-group">

<i class="fas fa-user"></i>


<input

type="text"

name="name"

placeholder="Full Name"

required>


</div>






<div class="input-group">

<i class="fas fa-envelope"></i>


<input

type="email"

name="email"

placeholder="Email Address"

required>


</div>






<div class="input-group">


<i class="fas fa-lock"></i>


<input

type="password"

name="password"

placeholder="Password"

required>


</div>







<div class="input-group">


<i class="fas fa-lock"></i>


<input

type="password"

name="confirm_password"

placeholder="Confirm Password"

required>


</div>






<button class="login-btn">


Create Account


</button>





</form>






<div class="signup-link">


Already have an account?


<a href="{{ url_for('login') }}">

Login

</a>



</div>





</div>



</div>


</div>



</body>


</html>
