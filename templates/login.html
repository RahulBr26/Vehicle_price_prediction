<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Price Predictor - Login</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}


body{

    height:100vh;
    background:
    linear-gradient(
        rgba(3,15,40,0.85),
        rgba(3,15,40,0.9)
    ),
    url("https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=1600");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

}



/* Main Container */

.login-container{

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

}



/* Login Card */

.login-card{

    width:380px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:35px;

    box-shadow:
    0 20px 40px rgba(0,0,0,0.4);

    color:white;

    animation:slide 0.8s ease;

}



@keyframes slide{

from{
    transform:translateY(-50px);
    opacity:0;
}

to{
    transform:translateY(0);
    opacity:1;
}

}



/* Logo */

.logo-section{

    text-align:center;

    margin-bottom:25px;

}


.car-icon{

    font-size:55px;

    color:#00c6ff;

    margin-bottom:10px;

}


.logo-section h1{

    font-size:30px;

    letter-spacing:1px;

}


.logo-section p{

    color:#ddd;

    font-size:16px;

}




/* Form */

.form-card h2{

    text-align:center;

    font-size:26px;

}


.form-card>p{

    text-align:center;

    color:#ddd;

    margin-bottom:25px;

}




.input-group{

    display:flex;

    align-items:center;

    background:white;

    border-radius:12px;

    padding:0 15px;

    margin-bottom:18px;

}


.input-group i{

    color:#0066ff;

    font-size:18px;

}



.input-group input{

    width:100%;

    border:none;

    outline:none;

    padding:15px;

    font-size:15px;

}




.options{

    display:flex;

    justify-content:space-between;

    font-size:14px;

    margin-bottom:20px;

}


.options a{

    color:#00c6ff;

    text-decoration:none;

}




.login-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:30px;

    background:

    linear-gradient(
    90deg,
    #0066ff,
    #00c6ff
    );


    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

}



.login-btn:hover{

    transform:scale(1.05);

    box-shadow:
    0 10px 20px rgba(0,198,255,0.4);

}




.signup-link{

    text-align:center;

    margin-top:25px;

    color:#ddd;

}


.signup-link a{

    color:#00c6ff;

    text-decoration:none;

    font-weight:bold;

}



.alert{

    background:#ff4d4d;

    padding:10px;

    border-radius:10px;

    text-align:center;

    margin-bottom:15px;

}



</style>

</head>



<body>


<div class="login-container">


<div class="login-card">


<div class="logo-section">

<i class="fas fa-car-side car-icon"></i>

<h1>Vehicle Price</h1>

<p>Prediction System</p>

</div>



<div class="form-card">


<h2>Welcome Back</h2>

<p>Login to your account</p>



{% with messages = get_flashed_messages() %}

{% if messages %}

<div class="alert">

{% for message in messages %}

{{message}}

{% endfor %}

</div>

{% endif %}

{% endwith %}





<form method="POST">


<div class="input-group">

<i class="fas fa-envelope"></i>

<input 
type="email"
name="email"
placeholder="Enter your email"
required>

</div>



<div class="input-group">

<i class="fas fa-lock"></i>

<input 
type="password"
name="password"
placeholder="Enter your password"
required>

</div>



<div class="options">


<label>

<input type="checkbox">

Remember Me

</label>


<a href="#">
Forgot Password?
</a>


</div>



<button class="login-btn">

Login

</button>


</form>




<div class="signup-link">

Don't have an account?

<a href="{{ url_for('register') }}">

Sign Up

</a>


</div>



</div>


</div>


</div>


</body>

</html>
