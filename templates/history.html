<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction History</title>


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}


body{

background:#f4f7fc;

}


/* Sidebar */

.sidebar{

position:fixed;

width:260px;

height:100vh;

background:#061b3a;

padding:25px;

color:white;

}


.logo{

display:flex;

align-items:center;

gap:15px;

font-size:25px;

font-weight:bold;

margin-bottom:40px;

}


.logo i{

color:#00c6ff;

font-size:35px;

}



.sidebar ul{

list-style:none;

}



.sidebar li{

margin:20px 0;

}



.sidebar a{

color:#ddd;

text-decoration:none;

display:flex;

gap:15px;

padding:14px;

border-radius:12px;

}



.sidebar a:hover{

background:#0066ff;

color:white;

}





/* Main */


.main{

margin-left:260px;

padding:30px;

}



.header{

display:flex;

justify-content:space-between;

align-items:center;

}



.header h1{

font-size:32px;

color:#102a43;

}



.header i{

font-size:45px;

color:#0066ff;

}





.table-box{

margin-top:30px;

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.1);

}



table{

width:100%;

border-collapse:collapse;

}



th{

background:#061b3a;

color:white;

padding:15px;

}



td{

padding:15px;

border-bottom:1px solid #ddd;

text-align:center;

}



tr:hover{

background:#f2f7ff;

}




.price{

color:#0066ff;

font-weight:bold;

}



@media(max-width:800px){

.sidebar{

position:relative;

width:100%;

height:auto;

}


.main{

margin-left:0;

}


}



</style>


</head>



<body>



<div class="sidebar">


<div class="logo">

<i class="fas fa-car-side"></i>

Vehicle AI

</div>



<ul>


<li>

<a href="/dashboard">

<i class="fas fa-chart-line"></i>

Dashboard

</a>

</li>



<li>

<a href="/predict">

<i class="fas fa-car"></i>

Predict Price

</a>

</li>



<li>

<a href="/history">

<i class="fas fa-clock"></i>

History

</a>

</li>



<li>

<a href="/logout">

<i class="fas fa-right-from-bracket"></i>

Logout

</a>

</li>


</ul>


</div>






<div class="main">


<div class="header">


<h1>
Prediction History
</h1>


<i class="fas fa-user-circle"></i>


</div>





<div class="table-box">


<table>


<tr>

<th>ID</th>

<th>Vehicle</th>

<th>Year</th>

<th>KMs</th>

<th>Fuel</th>

<th>Price</th>

<th>Date</th>

</tr>



{% for item in predictions %}


<tr>


<td>{{item.id}}</td>


<td>{{item.car_name}}</td>


<td>{{item.year}}</td>


<td>{{item.kms}}</td>


<td>{{item.fuel}}</td>


<td class="price">

₹ {{item.predicted_price}}

</td>


<td>{{item.created_at}}</td>


</tr>


{% endfor %}



</table>


</div>


</div>



</body>

</html>
